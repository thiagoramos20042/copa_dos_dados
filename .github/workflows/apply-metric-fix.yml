name: Apply metric fix

on:
  push:
    branches:
      - codex/corrige-metricas-de-acerto

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply local commit patch
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/metric-fix.patch
          git apply --whitespace=nowarn /tmp/metric-fix.patch
          rm .github/workflows/apply-metric-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add main.py .github/workflows/apply-metric-fix.yml
          git commit -m 'Corrige métricas de acerto'
          git push
