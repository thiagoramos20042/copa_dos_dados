name: Apply PR patch

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'codex/corrige-metricas-de-acerto'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/corrige-metricas-de-acerto
          fetch-depth: 0
      - name: Apply local commit patch
        shell: bash
        run: |
          patch_b64=$(sed -n "s/.*echo '\([^']*\)'.*/\1/p" .github/workflows/apply-metric-fix.yml)
          echo "$patch_b64" | base64 -d > /tmp/metric-fix.patch
          git apply --whitespace=nowarn /tmp/metric-fix.patch
          rm .github/workflows/apply-metric-fix.yml .github/workflows/pr-apply-metric-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add main.py .github/workflows/apply-metric-fix.yml .github/workflows/pr-apply-metric-fix.yml
          git commit -m 'Corrige métricas de acerto'
          git push origin HEAD:codex/corrige-metricas-de-acerto
